[[repos]]
repo = "local"

[[repos.hooks]]
id = "uv-sync"
name = "sync uv.lock"
entry = "bash -c 'uv sync && git add uv.lock'"
language = "system"
always_run = true
pass_filenames = false

[[repos.hooks]]
id = "ruff-format"
name = "ruff formatting"
entry = "bash -c 'uv run ruff format \"$@\" && git add -- \"$@\"' --"
language = "system"
types_or = ["python", "jupyter"]
